<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prism Core</title>
<style>
:root{
  --bg:#ffffff; --surface:#f7f7f4; --surface2:#efeee9;
  --text:#1f1f1c; --muted:#6f6e69; --faint:#9b998f; --border:#e7e5de;
  --blue:#2f6fe0; --blue-soft:#e9f1fd; --blue-text:#134a9e;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg);font-size:14px}
button{font-family:inherit;cursor:pointer}
.app{display:flex;flex-direction:column;height:100%}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px}
.logo{width:24px;height:24px;border-radius:6px;background:var(--blue-soft);color:var(--blue-text);display:flex;align-items:center;justify-content:center;font-size:13px}
.spacer{flex:1}
.icon-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--bg);border-radius:8px;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;font-size:15px}
.icon-btn:hover{background:var(--surface)}
.ctx{position:relative;display:inline-flex;align-items:center;margin-right:2px;cursor:default}
.ctx[hidden]{display:none}
.ctx svg{display:block}
.ctx-tip{position:absolute;bottom:150%;right:-2px;white-space:nowrap;background:var(--text);color:#fff;font-size:11px;line-height:1.2;padding:5px 9px;border-radius:7px;opacity:0;pointer-events:none;transition:opacity .12s;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.ctx:hover .ctx-tip{opacity:1}
.main{flex:1;display:flex;min-height:0}
.left{width:170px;flex-shrink:0;border-right:1px solid var(--border);padding:12px 10px;display:flex;flex-direction:column;gap:8px;overflow:auto}
.right{width:210px;flex-shrink:0;border-left:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:22px;overflow:auto}
.center{flex:1;min-width:0;display:flex;flex-direction:column}
.btn-primary{width:100%;padding:8px;border:none;border-radius:8px;background:var(--blue-soft);color:var(--blue-text);font-weight:500}
.btn-primary:hover{filter:brightness(.97)}
.label{font-size:11px;color:var(--faint);margin:8px 2px 2px}
.ws{display:flex;flex-direction:column;gap:6px;padding-bottom:10px;margin-bottom:6px;border-bottom:1px solid var(--border)}
.ws-row{display:flex;align-items:center;gap:4px}
#ws-select{flex:1;min-width:0}
.ws-act{width:24px;height:28px;border:1px solid var(--border);background:var(--bg);border-radius:7px;color:var(--muted);font-size:13px;flex-shrink:0;padding:0}
.ws-act:hover{background:var(--surface)}
.ws-hint{font-size:10px;color:var(--faint);padding:0 2px}
.thread{display:flex;align-items:center;gap:2px;padding:6px 8px;border-radius:8px;font-size:13px}
.thread:hover{background:var(--surface)}
.thread.active{background:var(--blue-soft);color:var(--blue-text)}
.thread-main{flex:1;min-width:0;cursor:pointer;overflow:hidden}
.thread-main>div:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thread .meta{font-size:11px;color:var(--faint);margin-top:2px}
.thread.active .meta{color:var(--blue-text)}
.thread-act{opacity:0;border:none;background:transparent;color:var(--faint);font-size:13px;line-height:1;padding:2px 5px;border-radius:6px}
.thread:hover .thread-act{opacity:1}
.thread-act:hover{background:var(--surface2);color:var(--text)}
.messages{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg-user{align-self:flex-end;max-width:80%;background:var(--blue-soft);color:var(--blue-text);padding:9px 12px;border-radius:12px;line-height:1.6}
.msg-asst{display:flex;gap:9px;max-width:90%}
.avatar{width:25px;height:25px;flex-shrink:0;border-radius:7px;background:var(--blue-soft);color:var(--blue-text);display:flex;align-items:center;justify-content:center;font-size:12px}
.asst-body{min-width:0}
.asst-text{line-height:1.7;white-space:pre-wrap}
.trace{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:6px}
.trace.ok::before{content:"✓";color:#1f9d57}
.trace.err::before{content:"✗";color:#c0392b}
.trace.call::before{content:"→";color:var(--blue)}
.trace.compact{color:#8a8a8a}
.trace.compact::before{content:"↯";color:#8a8a8a}
.trace.retry{color:#a07a00}
.trace.retry::before{content:"⟳";color:#e0a400}
.composer{padding:10px 14px 14px;border-top:1px solid var(--border)}
.composer-box{border:1px solid var(--border);border-radius:12px;padding:8px 10px}
.composer-box:focus-within{border-color:var(--blue)}
#input{width:100%;border:none;outline:none;resize:none;font-family:inherit;font-size:14px;background:transparent;min-height:24px;max-height:140px}
.composer-bar{display:flex;align-items:center;gap:6px;margin-top:6px}
select{height:30px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-family:inherit;font-size:12px;padding:0 6px;color:var(--text)}
.send-btn{width:32px;height:32px;border:none;border-radius:8px;background:var(--blue);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:15px}
.send-btn:disabled{opacity:.5}
.bypass{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
.perm{border:1px solid #e0b400;background:#fff8e1;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:13px}
.perm-q{color:#7a5d00;margin-bottom:6px}
.perm-acts{display:flex;gap:8px}
.perm-allow,.perm-deny{border:none;border-radius:6px;padding:4px 12px;font-size:12px}
.perm-allow{background:var(--blue);color:#fff}
.perm-deny{background:var(--surface2);color:var(--text)}
.perm-allow:disabled,.perm-deny:disabled{opacity:.5}
.panel-head{display:flex;align-items:center;font-size:11px;font-weight:500;color:var(--faint);letter-spacing:.02em;margin-bottom:4px}
.mini-btn{margin-left:auto;border:1px solid var(--border);background:var(--bg);border-radius:7px;font-size:11px;padding:3px 8px;color:var(--muted)}
.row{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 2px}
.row .tag{margin-left:auto;font-size:10px;color:var(--faint)}
.row .tag.full{color:var(--blue-text)}
.cat{font-size:11px;color:var(--faint);margin:10px 0 2px 2px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center}
.modal.hidden{display:none}
.modal-card{background:var(--bg);border-radius:12px;padding:18px;width:380px;max-width:90%;display:flex;flex-direction:column;gap:10px}
.modal-card h3{margin:0;font-size:15px;font-weight:600}
.modal-card input,.modal-card textarea,.modal-card select{width:100%;border:1px solid var(--border);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:13px}
.modal-card input[type=range]{padding:0;border:none;accent-color:var(--blue);cursor:pointer;height:18px}
.modal-card textarea{min-height:90px;resize:vertical}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
.modal-actions button{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px}
.modal-actions .primary{background:var(--blue);color:#fff;border:none}
.modal-card label{font-size:12px;color:var(--muted);margin-top:6px}
.muted{color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><span class="logo">◣</span> Prism Core</div>
    <div class="spacer"></div>
    <button class="icon-btn" id="open-settings" title="模型设置">⚙</button>
  </header>
  <div class="main">
    <aside class="left">
      <div class="ws">
        <div class="panel-head"><span>工作区</span>
          <button class="mini-btn" id="ws-new" title="新建工作区">+ 新建</button></div>
        <div class="ws-row">
          <select id="ws-select" title="切换工作区（长期记忆按工作区隔离）"></select>
          <button class="ws-act" id="ws-rename" title="重命名当前工作区">✎</button>
          <button class="ws-act" id="ws-del" title="删除当前工作区">×</button>
        </div>
        <div class="ws-hint">长期记忆按工作区隔离</div>
      </div>
      <button class="btn-primary" id="new-chat">+ 新对话</button>
      <div class="label">线程记录</div>
      <div id="threads"></div>
    </aside>

    <section class="center">
      <div class="messages" id="messages"></div>
      <div class="composer">
        <div class="composer-box">
          <textarea id="input" rows="1" placeholder="给 agent 下达指令…（Enter 发送，Shift+Enter 换行）"></textarea>
          <div class="composer-bar">
            <button class="icon-btn" title="添加上下文">+</button>
            <label class="bypass" title="开启后，危险操作（执行命令/写删文件）不再逐个确认"><input type="checkbox" id="bypass"> 绕过确认</label>
            <div class="spacer"></div>
            <select id="provider"></select>
            <div class="ctx" id="ctx" hidden>
              <svg viewBox="0 0 36 36" width="18" height="18" aria-hidden="true">
                <circle cx="18" cy="18" r="14" fill="none" stroke="var(--surface2)" stroke-width="6"/>
                <circle id="ctx-arc" cx="18" cy="18" r="14" fill="none" stroke="#1f9d57" stroke-width="6"
                        stroke-linecap="round" transform="rotate(-90 18 18)" stroke-dasharray="0 88"/>
              </svg>
              <span class="ctx-tip" id="ctx-tip"></span>
            </div>
            <button class="send-btn" id="send" title="发送">➤</button>
          </div>
        </div>
      </div>
    </section>

    <aside class="right">
      <div>
        <div class="panel-head"><span>MCP 能力</span><button class="mini-btn" id="add-mcp">+ 添加</button></div>
        <div id="mcp-list"></div>
      </div>
      <div>
        <div class="panel-head"><span>技能库</span><button class="mini-btn" id="new-skill">+ 新建</button></div>
        <div id="skills-list"></div>
      </div>
    </aside>
  </div>
</div>

<div class="modal hidden" id="skill-modal">
  <div class="modal-card">
    <h3>新建技能</h3>
    <input id="sk-name" placeholder="名称，如：资深制作人">
    <textarea id="sk-body" placeholder="技能内容（人格描述 / 做事套路 / 知识）"></textarea>
    <div style="display:flex;gap:8px">
      <select id="sk-disclosure" style="flex:1">
        <option value="lazy">按需（用到才读全文）</option>
        <option value="full">常驻（整段注入，人格用这个）</option>
      </select>
      <input id="sk-tags" style="flex:1" placeholder="分类，逗号分隔，如：人设, 音乐">
    </div>
    <div class="modal-actions">
      <button id="sk-cancel">取消</button>
      <button class="primary" id="sk-save">保存</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="mcp-modal">
  <div class="modal-card">
    <h3>添加 MCP 服务器</h3>
    <label>名称</label>
    <input id="mcp-name" placeholder="如 system">
    <label>命令</label>
    <input id="mcp-cmd" value="python">
    <label>参数（每行一个，通常是脚本路径）</label>
    <textarea id="mcp-args" placeholder="A:/路径/到/某个_mcp_server.py"></textarea>
    <div class="modal-actions">
      <button id="mcp-cancel">取消</button>
      <button class="primary" id="mcp-save">保存</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="settings-modal">
  <div class="modal-card">
    <h3>模型设置</h3>
    <label>默认模型</label>
    <select id="set-default"></select>
    <label>配置哪个模型</label>
    <select id="set-provider"></select>
    <label>Base URL</label>
    <input id="set-baseurl" placeholder="如 https://api.deepseek.com">
    <label>模型名称</label>
    <input id="set-model" placeholder="如 deepseek-chat">
    <label>上下文预算 <span id="set-window-val" class="muted"></span></label>
    <input id="set-window" type="range" min="0" max="10" step="1" value="4">
    <div class="muted" style="font-size:11px;margin-top:-3px">圆环分母 · 留质量余量，非模型硬上限</div>
    <label>API Key <span id="set-keystatus" class="muted"></span></label>
    <input id="set-key" type="password" placeholder="粘贴 key（留空 = 不修改）">

    <div style="border-top:1px solid var(--border);margin:12px 0 2px"></div>
    <h3 style="font-size:13px">Gemini / 感知（音频分析）</h3>
    <label>API Key <span id="gem-keystatus" class="muted"></span></label>
    <input id="gem-key" type="password" placeholder="粘贴音频分析 key（留空 = 不修改）">
    <button id="gem-import" class="mini-btn" style="display:none;align-self:flex-start;margin-top:4px">从环境变量导入到钥匙链</button>
    <label>Base URL <span class="muted" style="font-size:11px">（中转，留空 = Google 原生）</span></label>
    <input id="gem-baseurl" placeholder="如 https://your-relay/v1">
    <label>模型名称</label>
    <input id="gem-model" placeholder="如 gemini-2.5-flash">

    <div class="modal-actions">
      <button id="set-cancel">取消</button>
      <button class="primary" id="set-save">保存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
